<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINE SOPHIA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="main.js"

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand mb-0 h1">Cine Sophia</span>
</nav>

<div class="main-container">

    <!-- LEFT SIDE -->
    <div class="cinema-side">
        <h1>Cine Sophia</h1>
    </div>

    <!-- RIGHT SIDE FORM -->
    <div class="form-side">

        <h3>Student Details</h3>

        <label>Full Name:</label>
        <input type="text" id="FULLNAME" class="form-control mb-3">

        <h3>Ticket Selection</h3>

        <label>Quantity:</label>
        <input type="number" id="form" class="form-control mb-3">

        <h3>Payment Details</h3>

        <label>Sub Total:</label>
        <input class="form-control mb-2" type="number" readonly id="TSUB" value="0.00">

        <label>Admin Fee:</label>
        <input class="form-control mb-2" type="number" readonly id="FREE" value="50">

        <label>Total:</label>
        <input class="form-control mb-3" type="number" readonly id="tal">

        <button type="button" class="btn btn-primary">Calculate Total</button>
        <button type="button" class="btn btn-secondary">Reset</button>

    </div>

</div>

</body>
</html>
